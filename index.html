<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>ORNA КОДЕКС — статическая версия</title><link rel="stylesheet" href="style.css"></head><body><header><span class="brand">ORNA КОДЕКС</span><a href="#">Офлайн база</a></header><section class="hero"><h1>ORNA КОДЕКС</h1><div>Автономная статическая версия из скачанной копии. Поиск работает без JavaScript официального сайта и без API.</div></section><section class="toolbar"><input id="q" placeholder="Поиск: предмет, питомец, класс, монстр…"><div class="tabs" id="tabs"></div></section><div class="count" id="count"></div><main class="grid" id="grid"></main><script src="data.js"></script><script>let current='all'; const tabs=document.getElementById('tabs'), grid=document.getElementById('grid'), q=document.getElementById('q'), count=document.getElementById('count'); function img(src){return src?`<img class="icon" src="${src}" onerror="this.style.visibility='hidden'">`:''} function render(){let s=q.value.toLowerCase().trim(); let arr=DATA.filter(x=>(current==='all'||x.section===current)&&(!s||(x.name+' '+x.desc+' '+x.rank+' '+x.rarity).toLowerCase().includes(s))); count.textContent=`Найдено: ${arr.length} / ${DATA.length}`; grid.innerHTML=arr.map(x=>`<a class="card" href="${x.url}">${img(x.img)}<div class="name">${x.name}</div><div class="sub">${SECTIONS[x.section]} ${x.rank||''}</div>${x.rarity?`<div class="sub">${x.rarity}</div>`:''}</a>`).join('') || '<p>Ничего не найдено</p>'; } function makeTabs(){let keys=['all',...Object.keys(SECTIONS)]; tabs.innerHTML=keys.map(k=>`<button class="tab ${k==='all'?'active':''}" data-k="${k}">${k==='all'?'Все':SECTIONS[k]}</button>`).join(''); tabs.onclick=e=>{if(e.target.dataset.k){current=e.target.dataset.k; document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.k===current)); render();}}} q.oninput=render; makeTabs(); render();</script></body></html>
