<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ORNA КОДЕКС RU Clean</title><link rel="stylesheet" href="style.css"></head><body><div class="top"><div class="title">ORNA КОДЕКС</div><div class="sub">Чистая русская база: без меню, cookie-текста и иностранных описаний. Записей: <span id="total">0</span></div></div><div class="controls"><input id="q" placeholder="Поиск по названию, описанию, характеристикам"><div class="row"><select id="rank"><option value="">Все ранги</option><option>★1</option><option>★2</option><option>★3</option><option>★4</option><option>★5</option><option>★6</option><option>★7</option><option>★8</option><option>★9</option><option>★10</option><option>★11</option></select><select id="rarity"><option value="">Все редкости</option><option value="обычный">обычный</option><option value="редкий">редкий</option><option value="легендарный">легендарный</option><option value="богато украшенный">богато украшенный</option></select></div></div><div id="tabs" class="tabs"></div><div class="count">Показано: <span id="found">0 / 0</span></div><div id="cards" class="grid"></div><button id="more" class="more" onclick="more()">Показать ещё</button><div class="compareBar"><button id="cmp" onclick="showCompare()">Сравнить (0)</button><button onclick="clearCompare()">Очистить</button></div><div id="modal" class="modal" onclick="if(event.target.id==='modal')this.classList.remove('show')"><div class="box"><button class="close" onclick="modal.classList.remove('show')">×</button><div id="modalBody"></div></div></div><script src="script.js"></script></body></html>
